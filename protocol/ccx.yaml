# Lutron Clear Connect Type X (CCX) Protocol Definition
# Source of truth for CCX message types and CBOR structure
#
# CCX uses Thread (802.15.4) as transport with CBOR-encoded payloads.
# All messages are CBOR arrays: [msg_type, body_map]
# Body maps use integer keys (not string keys).

meta:
  name: "Lutron Clear Connect Type X"
  version: "1.0.0"
  description: "Thread/802.15.4 protocol for RadioRA3 and Homeworks QSX"
  transport:
    protocol: "Thread (802.15.4)"
    frequency_ghz: 2.4
    encoding: "CBOR"
    port: 9190
    multicast: "ff03::1"

# Level encoding (shared with CCA)
level:
  full_on: 0xFEFF
  off: 0x0000
  max: 0xFFFF
  encoding: "level16 = percent * 0xFEFF / 100"

# Fade/delay encoding
timing:
  unit: "quarter-seconds"
  encoding: "value = seconds * 4"
  default_fade: 1  # 0.25s = instant
  default_delay: 0  # no delay

# Sequence number
sequence:
  size: 8  # bits
  wrap: 256
  dedup_window_sec: 2

# Top-level body map keys (shared across all message types)
# Each CCX message is: [msg_type, { key: value, ... }]
body_keys:
  COMMAND:  { key: 0, description: "Inner command data (type-specific nested map)" }
  ZONE:    { key: 1, description: "Zone target: [zone_type, zone_id]" }
  DEVICE:  { key: 2, description: "Device info: [device_type, device_serial]" }
  EXTRA:   { key: 3, description: "Extra data map (scene ID, group ID, etc.)" }
  STATUS:  { key: 4, description: "Status value (used by PRESENCE)" }
  SEQUENCE: { key: 5, description: "8-bit sequence number for deduplication" }

# Device ID encoding for button types
# CCX device_id is a 4-byte CBOR byte string:
#   bytes 0-1 = LEAP Preset ID (big-endian uint16)
#   bytes 2-3 = 0xEF20 (constant)
device_id:
  size: 4
  preset_id_offset: 0
  preset_id_size: 2
  preset_id_endian: big
  constant_suffix: [0xEF, 0x20]

# Message Type Definitions
message_types:
  LEVEL_CONTROL:
    id: 0
    description: "Set zone level (on/off/dim). Primary command for OUTPUT control."
    category: OUTPUT
    body_keys: [COMMAND, ZONE, SEQUENCE]
    structure:
      # [0, { 0: {0: level, 3: fade, 4: delay}, 1: [16, zoneId], 5: seq }]
      command:
        0: { name: level, type: uint16, description: "Level value (0x0000-0xFEFF)" }
        3: { name: fade, type: uint16, unit: quarter-seconds, description: "Fade time (1 = 0.25s instant)" }
        4: { name: delay, type: uint16, unit: quarter-seconds, optional: true, description: "Delay before fade starts" }
      zone: "[zone_type, zone_id]"
    examples:
      full_on: "[0, {0: {0: 0xFEFF, 3: 1}, 1: [16, 961], 5: 92}]"
      off: "[0, {0: {0: 0, 3: 1}, 1: [16, 961], 5: 93}]"
      dim_50_slow: "[0, {0: {0: 0x7F80, 3: 40}, 1: [16, 961], 5: 94}]"

  BUTTON_PRESS:
    id: 1
    description: "Physical button press from pico/keypad. Uses DEVICE path."
    category: DEVICE
    body_keys: [COMMAND, SEQUENCE]
    structure:
      # [1, { 0: {0: device_id_bytes, 1: [cnt1, cnt2, cnt3]}, 5: seq }]
      command:
        0: { name: device_id, type: bytes(4), description: "4-byte device ID (preset_hi, preset_lo, 0xEF, 0x20)" }
        1: { name: counters, type: "array[uint]", description: "Frame counters for replay protection" }

  DIM_HOLD:
    id: 2
    description: "Dim hold start - first of a raise/lower pair (even sequence number)"
    category: DEVICE
    body_keys: [COMMAND, SEQUENCE]
    structure:
      # [2, { 0: {0: device_id_bytes, 1: action}, 5: seq_even }]
      command:
        0: { name: device_id, type: bytes(4), description: "Same format as BUTTON_PRESS" }
        1: { name: action, type: uint8, description: "3 = raise/lower" }

  DIM_STEP:
    id: 3
    description: "Dim step - second of a raise/lower pair (odd sequence number)"
    category: DEVICE
    body_keys: [COMMAND, SEQUENCE]
    structure:
      # [3, { 0: {0: device_id_bytes, 1: action, 2: step}, 5: seq_odd }]
      command:
        0: { name: device_id, type: bytes(4), description: "Same format as BUTTON_PRESS" }
        1: { name: action, type: uint8, description: "3 = raise/lower" }
        2: { name: step_value, type: uint16, description: "Step size or timing (180-250 observed)" }

  ACK:
    id: 7
    description: "Acknowledgment from processor"
    category: CONTROL
    body_keys: [COMMAND, SEQUENCE]
    structure:
      # [7, { 0: {1: {0: response_bytes}}, 5: seq }]
      command:
        1:
          0: { name: response, type: bytes, description: "Response payload (0x50='P' for level, 0x55='U' for button)" }

  DEVICE_REPORT:
    id: 27  # 0x1B
    description: "Device state report - broadcast by devices after executing commands"
    category: STATE
    body_keys: [COMMAND, DEVICE, EXTRA]
    structure:
      # [27, { 0: {inner_data}, 2: [device_type, device_serial], 3: {1: group_id} }]
      device: "[device_type, device_serial]"
      extra:
        1: { name: group_id, type: uint16, description: "Scene/group identifier" }
    notes: "No sequence number - uses device serial for identification"

  SCENE_RECALL:
    id: 36  # 0x24
    description: "Scene/group recall - triggers devices to execute stored scenes"
    category: OUTPUT
    body_keys: [COMMAND, ZONE, EXTRA, SEQUENCE]
    structure:
      # [36, { 0: {0: [4]}, 1: [0], 3: {0: scene_id, 2: [component_type, value]}, 5: seq }]
      command:
        0: { name: recall_cmd, type: "array[uint]", description: "[4] = recall action" }
      zone: "[target_list]"
      extra:
        0: { name: scene_id, type: uint16, description: "Scene/group identifier" }
        2: { name: params, type: "array[uint]", description: "[component_type, value] e.g. [5, 60]" }

  COMPONENT_CMD:
    id: 40  # 0x28
    description: "Component command - shade position, fan speed, CCO relay, etc."
    category: OUTPUT
    body_keys: [COMMAND, ZONE, EXTRA, SEQUENCE]
    structure:
      # [40, { 0: {0: 0}, 1: [targets], 3: {0: group_id, 2: [type, value]}, 5: seq }]
      command:
        0: { name: action, type: uint8, description: "0 = set" }
      zone: "[target_list]"
      extra:
        0: { name: group_id, type: uint16, description: "Component group ID" }
        2: { name: params, type: "array[uint]", description: "[component_type, value] e.g. [10, 4800]" }

  STATUS:
    id: 41  # 0x29
    description: "Device status update with binary payload"
    category: STATE
    body_keys: [COMMAND, DEVICE, EXTRA, SEQUENCE]
    structure:
      # [41, { 0: {0: 0, 2: status_bytes}, 2: [type, device_id], 3: {1: extra}, 5: seq }]
      command:
        0: { name: action, type: uint8 }
        2: { name: payload, type: bytes, description: "Binary status payload" }
      device: "[device_type, device_id]"

  PRESENCE:
    id: 65535  # 0xFFFF
    description: "Periodic presence/heartbeat announcement"
    category: CONTROL
    body_keys: [STATUS, SEQUENCE]
    structure:
      # [65535, { 4: status, 5: seq }]
      status: { name: status, type: uint8, description: "1 = alive" }

# Category descriptions (parallel to CCA OUTPUT vs DEVICE split)
categories:
  OUTPUT: "Zone/load control with level, fade, delay"
  DEVICE: "Component control - button presses, dimming actions"
  STATE: "Device state reports and status updates"
  CONTROL: "Protocol control messages (ACK, presence)"
