# Lutron Clear Connect Type A (CCA) Protocol Definition
# Source of truth for all generated code
# Regenerate: npm run codegen (from repo root)

meta:
  name: "Lutron Clear Connect Type A"
  version: "1.1.0"
  description: "RF protocol for RadioRA3, Homeworks QSX, Caseta Pro, and Vive"
  ecosystems:
    CASETA: { description: "Consumer-grade, bridge-based" }
    RA3: { description: "Pro-grade, RadioRA3 / Homeworks QSX" }
    VIVE: { description: "Commercial-grade, hub-based" }
    HOMEWORKS: { description: "Legacy/High-end Homeworks" }

# ID Ranges and Patterns
id_schemas:
  PICO:
    pattern: "XX XX XX XX"
    endian: big
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Static hardware ID printed on device"
  CASETA_LOAD:
    pattern: "06 [Subnet] [Suffix]"
    endian: little
    ecosystems: [CASETA]
    description: "Assigned load ID. Suffix (byte 5) is typically 0x80 for primary load."
  RA3_SUBNET:
    pattern: "00 [Subnet] [Suffix]"
    endian: little
    ecosystems: [RA3, HOMEWORKS]
    description: "Logical area address. Suffix (byte 5) is typically 0xA1 for integration."
  VIVE_HUB:
    pattern: "[Hub3] [Hub2] [Hub1] [Zone]"
    endian: mixed
    ecosystems: [VIVE]
    description: "Vive hub-centric addressing"

# Sequence Byte Analysis (Byte 1)
# 
# Sequence numbers typically increment by 6 (0x06).
# However, the byte appears to be bit-fielded:
#   bits 0-2: May encode retransmission index or repeater count
#   bits 3-7: Primary rolling sequence counter
sequence_analysis:
  increment: 6
  wrap: 0x48
  bit_fields:
    repeater_index: { mask: 0x07, description: "Low 3 bits often vary across repeaters" }
    counter: { mask: 0xF8, description: "High 5 bits act as the rolling counter" }

# RF Physical Layer
#
# Device IDs are 32-bit values with specific structure depending on device type:
#
# Pico remotes (button packets):
#   - Use big-endian format
#   - Hardware ID printed on label (e.g., 0x0595E68D)
#
# Bridge zones:
#   - Use little-endian format
#   - Structure: 0x00 | zone_bytes | suffix
#   - Example: 0x002C90AD = bridge zone in zone 902C, suffix AD
#
# Dimmer load IDs (after pairing):
#   - Use little-endian format
#   - Structure: 0x06 | zone_bytes | suffix
#   - Example: 0x062C9080 = dimmer in zone 902C, suffix 80
#   - Dimmer reports using assigned load ID, not hardware ID
#
# The zone_bytes portion (e.g., 2C 90 = 902C big-endian) is shared between
# the bridge and all devices paired to that zone.

# Vive Zone Encoding
#
# In Vive pairing and control packets, zone IDs are accompanied by a "zone reference"
# byte that encodes the zone using a fixed offset. The device uses this reference
# as the authoritative zone identifier:
#
# Format 0x28 packets (A9, AB zone assignment):
#   zone_ref = zone_id + 0x23
#   Example: zone 0x38 -> zone_ref 0x5b
#
# Format 0x12 packets (config) and Format 0x0E packets (control):
#   zone_ref = zone_id + 0xB7
#   Example: zone 0x38 -> zone_ref 0xef
#
# Both the zone_id and zone_ref bytes must be correctly set for proper pairing.

# RF Physical Layer
rf:
  frequency_hz: 433602844
  deviation_hz: 41200
  baud_rate: 62484.7
  modulation: "2-FSK"
  encoding: "N81"  # Async serial: 1 start, 8 data (LSB first), 1 stop

# CRC Configuration
crc:
  polynomial: 0xCA0F
  width: 16
  initial: 0x0000
  byte_order: big_endian

# Packet Framing
framing:
  preamble_bits: 32
  preamble_pattern: 0xAAAAAAAA
  sync_byte: 0xFF
  prefix: [0xFA, 0xDE]
  trailing_bits: 16

# Timing Constants (milliseconds)
timing:
  button_repeat_ms: 70
  beacon_interval_ms: 65
  pairing_interval_ms: 75
  level_report_ms: 60
  unpair_interval_ms: 60
  led_config_interval_ms: 75

# Sequence number behavior (constant across all packet types)
sequence:
  increment: 6
  wrap: 0x48

# Packet Lengths
lengths:
  standard: 24
  pairing: 53

# Field Format Types
field_formats:
  hex:
    description: "Raw hex byte(s)"
  decimal:
    description: "Decimal integer"
  device_id:
    description: "32-bit device ID, little-endian"
    size: 4
    endian: little
  device_id_be:
    description: "32-bit device ID, big-endian"
    size: 4
    endian: big
  level_byte:
    description: "Single byte level (0x00-0xFE = 0-100%)"
    size: 1
    divisor: 254
  level_16bit:
    description: "16-bit level (0x0000-0xFEFF = 0-100%)"
    size: 2
    endian: big
    divisor: 65279
  button:
    description: "Button code"
    enum_ref: button
  action:
    description: "Action code"
    enum_ref: action

# Enumerations
enums:
  button:
    description: "Button code values"
    values:
      ON:       { value: 0x02, description: "5-button ON / top" }
      FAVORITE: { value: 0x03, description: "5-button FAV / middle" }
      OFF:      { value: 0x04, description: "5-button OFF / bottom" }
      RAISE:    { value: 0x05, description: "5-button RAISE" }
      LOWER:    { value: 0x06, description: "5-button LOWER" }
      SCENE4:   { value: 0x08, description: "4-button top (scene: BRIGHT, rl: ON)" }
      SCENE3:   { value: 0x09, description: "4-button second (scene: 2nd, rl: RAISE)" }
      SCENE2:   { value: 0x0A, description: "4-button third (scene: 3rd, rl: LOWER)" }
      SCENE1:   { value: 0x0B, description: "4-button bottom (scene: OFF, rl: OFF)" }
      RESET:    { value: 0xFF, description: "Reset/unpair" }

  action:
    description: "Button action codes"
    values:
      PRESS:   { value: 0x00 }
      RELEASE: { value: 0x01 }
      HOLD:    { value: 0x02, description: "Continuous hold for dimming" }
      SAVE:    { value: 0x03, description: "Save favorite/scene" }

  category:
    description: "Packet categories for filtering"
    values:
      BUTTON: { description: "Button press/release from Pico" }
      STATE: { description: "Dimmer/switch state reports" }
      BEACON: { description: "Pairing beacons" }
      PAIRING: { description: "Pairing announcements" }
      CONFIG: { description: "Device configuration" }
      HANDSHAKE: { description: "Pairing responses" }

  device_class:
    description: "Device class codes (byte 28 in pairing)"
    values:
      DIMMER: { value: 0x04 }
      SWITCH: { value: 0x05 }
      FAN: { value: 0x06 }
      SHADE: { value: 0x0A }
      KEYPAD: { value: 0x0B }

# Packet Type Definitions
packet_types:
  # Button packets (24 bytes)
  # Picos alternate between group A (0x88/0x89) and group B (0x8A/0x8B)
  # on successive button events. This alternation enables double-tap detection:
  # the receiver can distinguish a new press from retransmissions of the same press.
  #
  # Within each group, SHORT = press, LONG = release:
  #   Group A press:   0x88 (BTN_PRESS_A)    - short format
  #   Group A release: 0x89 (BTN_RELEASE_A)  - long format
  #   Group B press:   0x8A (BTN_PRESS_B)    - short format
  #   Group B release: 0x8B (BTN_RELEASE_B)  - long format
  #
  # Bit pattern: base 0x88 | bit 1 = group (0=A, 1=B) | bit 0 = action (0=press, 1=release)
  # Button packet format notes:
  #
  # All 4-button picos (scene + raise/lower) use button codes SCENE1-SCENE4 (0x08-0x0B).
  # The press/release semantics are INVERTED between pico types:
  #
  #   Scene pico:  PRESS = short (fmt 0x04, action 0x00, 0x00 padding)
  #                RELEASE = extended (fmt 0x0E, action 0x01, cmd_class + preset_id)
  #
  #   R/L pico:    PRESS = extended (fmt 0x0E, action 0x01, cmd_class + payload)
  #                RELEASE = short (fmt 0x04 for on/off, fmt 0x0C for raise/lower)
  #
  # Extended payload (bytes 12-21, present when format = 0x0E):
  #   12-15: device_id repeat
  #   16:    0x00
  #   17:    cmd_class — 0x40 = scene/preset select, 0x42 = dim control
  #   18:    cmd_action — 0x00 (scene) or 0x02 (dim)
  #   19:    cmd_param — preset_id (0x20+) when class=0x40, direction when class=0x42
  #   20-21: tail — 0x00 0x00 (scene) or 0x00 0x1E (dim)
  #
  # cmd_class 0x40 preset IDs (byte 19):
  #   Sequential from 0x20: top button = 0x20, second = 0x21, third = 0x22, bottom = 0x23
  #   R/L pico only has 2 scene buttons (ON=0x20, OFF=0x21)
  #   Scene pico has 4 (BRIGHT=0x20, 2nd=0x21, 3rd=0x22, OFF=0x23)
  #
  # cmd_class 0x42 dim direction (byte 19):
  #   0x01 = raise, 0x00 = lower

  BTN_PRESS_A:
    value: 0x88
    length: 24
    category: BUTTON
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Button press, group A"
    device_id_endian: big
    fields:
      - { name: type,          offset: 0,  size: 1, format: hex }
      - { name: sequence,      offset: 1,  size: 1, format: decimal }
      - { name: device_id,     offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,      offset: 6,  size: 1, format: hex, description: "Always 0x21" }
      - { name: format,        offset: 7,  size: 1, format: hex, description: "0x04=tap, 0x0E=extended cmd" }
      - { name: pico_frame,    offset: 8,  size: 1, format: hex, description: "0x03 for pico" }
      - { name: button,        offset: 10, size: 1, format: button }
      - { name: action,        offset: 11, size: 1, format: action, description: "0x00=no payload, 0x01=has payload" }
      - { name: device_repeat, offset: 12, size: 4, format: device_id_be, description: "Present when format=0x0E" }
      - { name: cmd_class,     offset: 17, size: 1, format: hex, description: "0x40=scene, 0x42=dim (when format=0x0E)" }
      - { name: cmd_param,     offset: 19, size: 1, format: hex, description: "Preset ID or dim direction (when format=0x0E)" }
      - { name: crc,           offset: 22, size: 2, format: hex }

  BTN_RELEASE_A:
    value: 0x89
    length: 24
    category: BUTTON
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Button release, group A"
    device_id_endian: big
    fields:
      - { name: type,          offset: 0,  size: 1, format: hex }
      - { name: sequence,      offset: 1,  size: 1, format: decimal }
      - { name: device_id,     offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,      offset: 6,  size: 1, format: hex }
      - { name: format,        offset: 7,  size: 1, format: hex, description: "0x0E=extended cmd, 0x04=tap, 0x0C=dim stop" }
      - { name: pico_frame,    offset: 8,  size: 1, format: hex, description: "0x03 for pico" }
      - { name: button,        offset: 10, size: 1, format: button }
      - { name: action,        offset: 11, size: 1, format: action, description: "0x00=no payload, 0x01=has payload" }
      - { name: device_repeat, offset: 12, size: 4, format: device_id_be }
      - { name: cmd_class,     offset: 17, size: 1, format: hex, description: "0x40=scene, 0x42=dim (when format=0x0E)" }
      - { name: cmd_param,     offset: 19, size: 1, format: hex, description: "Preset ID or dim direction (when format=0x0E)" }
      - { name: crc,           offset: 22, size: 2, format: hex }

  BTN_PRESS_B:
    value: 0x8A
    length: 24
    category: BUTTON
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Button press, group B"
    device_id_endian: big
    fields:
      - { name: type,          offset: 0,  size: 1, format: hex }
      - { name: sequence,      offset: 1,  size: 1, format: decimal }
      - { name: device_id,     offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,      offset: 6,  size: 1, format: hex, description: "Always 0x21" }
      - { name: format,        offset: 7,  size: 1, format: hex, description: "0x04=tap, 0x0E=extended cmd" }
      - { name: pico_frame,    offset: 8,  size: 1, format: hex, description: "0x03 for pico" }
      - { name: button,        offset: 10, size: 1, format: button }
      - { name: action,        offset: 11, size: 1, format: action, description: "0x00=no payload, 0x01=has payload" }
      - { name: device_repeat, offset: 12, size: 4, format: device_id_be, description: "Present when format=0x0E" }
      - { name: cmd_class,     offset: 17, size: 1, format: hex, description: "0x40=scene, 0x42=dim (when format=0x0E)" }
      - { name: cmd_param,     offset: 19, size: 1, format: hex, description: "Preset ID or dim direction (when format=0x0E)" }
      - { name: crc,           offset: 22, size: 2, format: hex }

  BTN_RELEASE_B:
    value: 0x8B
    length: 24
    category: BUTTON
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Button release, group B"
    device_id_endian: big
    fields:
      - { name: type,          offset: 0,  size: 1, format: hex }
      - { name: sequence,      offset: 1,  size: 1, format: decimal }
      - { name: device_id,     offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,      offset: 6,  size: 1, format: hex }
      - { name: format,        offset: 7,  size: 1, format: hex, description: "0x0E=extended cmd, 0x04=tap, 0x0C=dim stop" }
      - { name: pico_frame,    offset: 8,  size: 1, format: hex, description: "0x03 for pico" }
      - { name: button,        offset: 10, size: 1, format: button }
      - { name: action,        offset: 11, size: 1, format: action, description: "0x00=no payload, 0x01=has payload" }
      - { name: device_repeat, offset: 12, size: 4, format: device_id_be }
      - { name: cmd_class,     offset: 17, size: 1, format: hex, description: "0x40=scene, 0x42=dim (when format=0x0E)" }
      - { name: cmd_param,     offset: 19, size: 1, format: hex, description: "Preset ID or dim direction (when format=0x0E)" }
      - { name: crc,           offset: 22, size: 2, format: hex }

  # State report packets (24 bytes)
  # Type byte cycles 81 → 82 → 83 → 81... on each periodic report.
  # Burst structure: 52 packets (seq 0-51), pairs spaced ~50ms apart,
  # ~12.5ms between retransmissions within a pair.
  # Byte 11 = actual light output level (0x00 when off).
  # Byte 15 = slider/preset level — the level the dimmer WILL go to when
  # turned on. Reports slider position even while off. This is how the
  # bridge knows the dimmer's preset level without the light being on.
  # Byte 14 = 0x92 observed consistently (purpose unknown, may encode
  # on/off state or device capability flags).
  # LEAP correlation: each burst triggers a /device/status/deviceheard event.
  STATE_RPT_81:
    value: 0x81
    length: 24
    category: STATE
    ecosystems: [CASETA, RA3, HOMEWORKS]
    description: "State report (type 81, cycles 81→82→83)"
    device_id_endian: little
    fields:
      - { name: type,         offset: 0,  size: 1, format: hex }
      - { name: sequence,     offset: 1,  size: 1, format: decimal }
      - { name: device_id,    offset: 2,  size: 4, format: device_id }
      - { name: protocol,     offset: 6,  size: 1, format: hex }
      - { name: format,       offset: 7,  size: 1, format: hex, description: "0x08 = periodic state report" }
      - { name: level,        offset: 11, size: 1, format: level_byte, description: "Light output level (0x00=off)" }
      - { name: slider_level, offset: 15, size: 1, format: level_byte, description: "Slider/preset level (position even when off)" }
      - { name: crc,          offset: 22, size: 2, format: hex }

  STATE_RPT_82:
    value: 0x82
    length: 24
    category: STATE
    ecosystems: [CASETA, RA3, HOMEWORKS]
    description: "State report (type 82, cycles 81→82→83)"
    device_id_endian: little
    inherits: STATE_RPT_81

  STATE_RPT_83:
    value: 0x83
    length: 24
    category: STATE
    ecosystems: [CASETA, RA3, HOMEWORKS]
    description: "State report (type 83, cycles 81→82→83)"
    device_id_endian: little
    inherits: STATE_RPT_81

  # Dimmer state report during pairing (24 bytes)
  STATE_80:
    value: 0x80
    length: 24
    category: STATE
    ecosystems: [CASETA, RA3]
    description: "Dimmer state report (pairing phase)"
    device_id_endian: little
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: zone_id,   offset: 3,  size: 2, format: hex }
      - { name: protocol,  offset: 5,  size: 1, format: hex }
      - { name: crc,       offset: 22, size: 2, format: hex }

  # Configuration packets (24 bytes)
  CONFIG_A1:
    value: 0xA1
    length: 24
    category: CONFIG
    ecosystems: [CASETA, RA3]
    description: "Configuration packet (pairing)"
    device_id_endian: little
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: device_id, offset: 2,  size: 4, format: device_id }
      - { name: protocol,  offset: 6,  size: 1, format: hex }
      - { name: format,    offset: 7,  size: 1, format: hex }
      - { name: data,      offset: 8,  size: 14, format: hex }
      - { name: crc,       offset: 22, size: 2, format: hex }

  # Set level command (24 bytes, special format)
  SET_LEVEL:
    value: 0xA2
    length: 24
    category: CONFIG
    ecosystems: [CASETA, RA3, VIVE, HOMEWORKS]
    description: "Set level command"
    device_id_endian: little
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: source_id, offset: 2,  size: 4, format: device_id }
      - { name: protocol,  offset: 6,  size: 1, format: hex }
      - { name: format,    offset: 7,  size: 1, format: hex }
      - { name: target_id, offset: 9,  size: 4, format: device_id_be }
      - { name: level,     offset: 16, size: 2, format: level_16bit }
      - { name: crc,       offset: 22, size: 2, format: hex }

  # Beacon packets (24 bytes)
  BEACON_91:
    value: 0x91
    length: 24
    category: BEACON
    ecosystems: [CASETA, RA3]
    description: "Pairing beacon"
    device_id_endian: big
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: load_id,   offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,  offset: 6,  size: 1, format: hex }
      - { name: format,    offset: 7,  size: 1, format: hex }
      - { name: broadcast, offset: 9,  size: 5, format: hex, description: "FF FF FF FF FF" }
      - { name: crc,       offset: 22, size: 2, format: hex }

  BEACON_92:
    value: 0x92
    length: 24
    category: BEACON
    ecosystems: [CASETA, RA3]
    description: "Beacon stop"
    device_id_endian: big
    inherits: BEACON_91

  BEACON_93:
    value: 0x93
    length: 24
    category: BEACON
    ecosystems: [CASETA, RA3]
    description: "Initial pairing beacon"
    device_id_endian: big
    inherits: BEACON_91

  # Pairing packets (53 bytes)
  # DIMMER_DISCOVERY (0xB0) - Dimmer announces itself during bridge pairing
  PAIR_B0:
    value: 0xB0
    length: 53
    category: PAIRING
    ecosystems: [CASETA, RA3]
    description: "Dimmer discovery (announces hardware ID to bridge)"
    device_id_endian: big
    fields:
      - { name: type,        offset: 0,  size: 1, format: hex }
      - { name: sequence,    offset: 1,  size: 1, format: decimal }
      - { name: flags,       offset: 2,  size: 1, format: hex }
      - { name: zone_id,     offset: 3,  size: 2, format: hex, description: "Bridge zone ID" }
      - { name: pair_flag,   offset: 5,  size: 1, format: hex, description: "0x7F during pairing" }
      - { name: protocol,    offset: 6,  size: 1, format: hex }
      - { name: format,      offset: 7,  size: 1, format: hex }
      - { name: broadcast,   offset: 9,  size: 5, format: hex, description: "FF FF FF FF FF" }
      - { name: hardware_id, offset: 16, size: 4, format: device_id_be, description: "Dimmer hardware ID" }
      - { name: device_type, offset: 20, size: 1, format: hex, description: "0x04=dimmer" }
      - { name: crc,         offset: 51, size: 2, format: hex }

  PAIR_B8:
    value: 0xB8
    length: 53
    category: PAIRING
    ecosystems: [CASETA, RA3, VIVE]
    description: "Device pairing request (Vive) / bridge-only pairing (pico)"
    device_id_endian: big
    fields:
      - { name: type,        offset: 0,  size: 1, format: hex }
      - { name: sequence,    offset: 1,  size: 1, format: decimal }
      - { name: device_id,   offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,    offset: 6,  size: 1, format: hex }
      - { name: format,      offset: 7,  size: 1, format: hex }
      - { name: btn_scheme,  offset: 10, size: 1, format: hex, description: "Button scheme byte" }
      - { name: broadcast,   offset: 13, size: 5, format: hex, description: "FF FF FF FF FF" }
      - { name: device_id2,  offset: 20, size: 4, format: device_id_be }
      - { name: device_id3,  offset: 24, size: 4, format: device_id_be }
      - { name: device_class, offset: 28, size: 1, format: hex }
      - { name: crc,         offset: 51, size: 2, format: hex }

  PAIR_B9:
    value: 0xB9
    length: 53
    category: PAIRING
    ecosystems: [CASETA, RA3, VIVE]
    description: "Direct-pair capable / Vive beacon"
    device_id_endian: big
    inherits: PAIR_B8

  PAIR_BA:
    value: 0xBA
    length: 53
    category: PAIRING
    ecosystems: [CASETA, RA3, VIVE]
    description: "Bridge-only pairing (pico) / Vive accept"
    device_id_endian: big
    inherits: PAIR_B8

  PAIR_BB:
    value: 0xBB
    length: 53
    category: PAIRING
    ecosystems: [CASETA, RA3, VIVE]
    description: "Direct-pair capable"
    device_id_endian: big
    inherits: PAIR_B8

  # Pairing response packets (24 bytes)
  PAIR_RESP_C0:
    value: 0xC0
    length: 24
    category: HANDSHAKE
    description: "Pairing response"
    device_id_endian: big
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: device_id, offset: 2,  size: 4, format: device_id_be }
      - { name: protocol,  offset: 6,  size: 1, format: hex }
      - { name: format,    offset: 7,  size: 1, format: hex }
      - { name: data,      offset: 8,  size: 14, format: hex }
      - { name: crc,       offset: 22, size: 2, format: hex }

  # Handshake packets - 6-round exchange between dimmer and bridge
  # Dimmer sends odd types (C1, C7, CD, D3, D9, DF), bridge sends even (C2, C8, CE, D4, DA, E0)
  # Each side increments by 6 (same as sequence byte increment)

  # Round 1
  HS_C1:
    value: 0xC1
    length: 24
    category: HANDSHAKE
    description: "Handshake round 1 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_C2:
    value: 0xC2
    length: 24
    category: HANDSHAKE
    description: "Handshake round 1 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Round 2
  HS_C7:
    value: 0xC7
    length: 24
    category: HANDSHAKE
    description: "Handshake round 2 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_C8:
    value: 0xC8
    length: 24
    category: HANDSHAKE
    description: "Handshake round 2 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Round 3
  HS_CD:
    value: 0xCD
    length: 24
    category: HANDSHAKE
    description: "Handshake round 3 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_CE:
    value: 0xCE
    length: 24
    category: HANDSHAKE
    description: "Handshake round 3 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Round 4
  HS_D3:
    value: 0xD3
    length: 24
    category: HANDSHAKE
    description: "Handshake round 4 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_D4:
    value: 0xD4
    length: 24
    category: HANDSHAKE
    description: "Handshake round 4 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Round 5
  HS_D9:
    value: 0xD9
    length: 24
    category: HANDSHAKE
    description: "Handshake round 5 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_DA:
    value: 0xDA
    length: 24
    category: HANDSHAKE
    description: "Handshake round 5 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Round 6
  HS_DF:
    value: 0xDF
    length: 24
    category: HANDSHAKE
    description: "Handshake round 6 (dimmer)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  HS_E0:
    value: 0xE0
    length: 24
    category: HANDSHAKE
    description: "Handshake round 6 (bridge)"
    device_id_endian: big
    inherits: PAIR_RESP_C0

  # Virtual types (assigned by decoder based on format byte)
  UNPAIR:
    value: 0xF0
    virtual: true
    length: 24
    category: CONFIG
    description: "Unpair command (derived from STATE_RPT format 0x0C)"
    device_id_endian: little
    fields:
      - { name: type,      offset: 0,  size: 1, format: hex }
      - { name: sequence,  offset: 1,  size: 1, format: decimal }
      - { name: source_id, offset: 2,  size: 4, format: device_id }
      - { name: protocol,  offset: 6,  size: 1, format: hex }
      - { name: format,    offset: 7,  size: 1, format: hex, description: "0x0C for unpair" }
      - { name: broadcast, offset: 9,  size: 5, format: hex, description: "FF FF FF FF FF" }
      - { name: target_id, offset: 16, size: 4, format: device_id_be }
      - { name: crc,       offset: 22, size: 2, format: hex }

  UNPAIR_PREP:
    value: 0xF1
    virtual: true
    length: 24
    category: CONFIG
    description: "Unpair preparation (derived from STATE_RPT format 0x09)"
    device_id_endian: little
    inherits: UNPAIR

  LED_CONFIG:
    value: 0xF2
    virtual: true
    length: 24
    category: CONFIG
    description: "LED configuration (derived from STATE_RPT format 0x0A)"
    device_id_endian: little

# Transmission Sequences
# Note: sequence numbers always increment by 6 (defined in sequence.increment)
sequences:
  button_press:
    description: "Standard 5-button Pico press"
    params:
      - { name: device_id, type: u32 }
      - { name: button, type: button }
    steps:
      - { packet: BTN_PRESS_A, count: 3, interval_ms: 70 }
      - { packet: BTN_RELEASE_A, count: 1 }

  button_release:
    description: "Button release (sent after press)"
    params:
      - { name: device_id, type: u32 }
      - { name: button, type: button }
    steps:
      - { packet: BTN_PRESS_B, count: 3, interval_ms: 70 }
      - { packet: BTN_RELEASE_B, count: 1 }

  button_hold:
    description: "Dimming hold (raise/lower)"
    params:
      - { name: device_id, type: u32 }
      - { name: button, type: button }
    steps:
      - { packet: BTN_PRESS_A, count: null, interval_ms: 65 }  # Repeat until stop

  set_level:
    description: "Set dimmer level"
    params:
      - { name: source_id, type: u32 }
      - { name: target_id, type: u32 }
      - { name: level, type: u8, description: "0-100%" }
    steps:
      - { packet: SET_LEVEL, count: 20, interval_ms: 60 }

  pairing_beacon:
    description: "Pairing beacon broadcast"
    params:
      - { name: subnet, type: u16 }
    steps:
      - { packet: BEACON_91, count: null, interval_ms: 65 }  # Repeat for duration

  pico_pairing:
    description: "Pico pairing announcement"
    params:
      - { name: device_id, type: u32 }
      - { name: pico_type, type: str, description: "5btn, 4btn-scene, 4btn-rl, 2btn" }
    steps:
      - { packet: PAIR_B9, count: 15, interval_ms: 75 }  # Packet type varies by pico_type

  unpair:
    description: "Unpair device from bridge"
    params:
      - { name: source_id, type: u32 }
      - { name: target_id, type: u32 }
    steps:
      - { packet: UNPAIR, count: 20, interval_ms: 60 }

# Pairing Presets (button schemes and capability bytes)
# Byte 38 is the engraving code — unique per factory engraving.
pairing_presets:
  5btn:
    description: "5-button Pico (ON/FAV/OFF/RAISE/LOWER)"
    packet: PAIR_B9
    btn_scheme: 0x04
    bytes:
      30: 0x03
      31: 0x00
      37: 0x02
      38: 0x06

  2btn:
    description: "2-button Pico (ON/OFF)"
    packet: PAIR_B9
    btn_scheme: 0x04
    bytes:
      30: 0x03
      31: 0x08
      37: 0x01
      38: 0x01

  2btn-home:
    description: "2-button Pico (HOME/AWAY)"
    packet: PAIR_BB
    btn_scheme: 0x04
    bytes:
      30: 0x03
      31: 0x00
      37: 0x02
      38: 0x23

  4btn-rl:
    description: "4-button raise/lower Pico (ON/RAISE/LOWER/OFF)"
    packet: PAIR_B9
    btn_scheme: 0x0B
    bytes:
      30: 0x02
      31: 0x00
      37: 0x02
      38: 0x21

  4btn-cooking:
    description: "4-button scene Pico (BRIGHT/COOKING/DINING/OFF)"
    packet: PAIR_B9
    btn_scheme: 0x0B
    bytes:
      30: 0x04
      31: 0x00
      37: 0x02
      38: 0x25

  4btn-movie:
    description: "4-button scene Pico (BRIGHT/ENTERTAIN/MOVIE/OFF)"
    packet: PAIR_B9
    btn_scheme: 0x0B
    bytes:
      30: 0x04
      31: 0x00
      37: 0x02
      38: 0x26

  4btn-relax:
    description: "4-button scene Pico (BRIGHT/ENTERTAIN/RELAX/OFF) - bridge-only"
    packet: PAIR_B8
    btn_scheme: 0x0B
    bytes:
      30: 0x04
      31: 0x00
      37: 0x02
      38: 0x27

  4btn-scene-custom:
    description: "4-button scene Pico (custom engraved)"
    packet: PAIR_B9
    btn_scheme: 0x0B
    bytes:
      30: 0x04
      31: 0x00
      37: 0x02
      38: 0x28
