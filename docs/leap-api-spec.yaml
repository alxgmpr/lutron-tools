openapi: 3.0.3
info:
  title: Lutron LEAP API (Phoenix RA3 Processor)
  description: |
    Extracted from multi-server-phoenix.gobin v26.01.13f000.
    384 endpoint handlers, 773 object types, 14 communique types.

    LEAP uses JSON over TLS (port 8081) with newline-delimited messages.
    Each message has CommuniqueType, Header (Url, MessageBodyType), and Body.
    This is NOT a REST API — it's a custom protocol that resembles REST.

    CommuniqueTypes: ReadRequest, ReadResponse, CreateRequest, CreateResponse,
    UpdateRequest, UpdateResponse, DeleteRequest, DeleteResponse,
    SubscribeRequest, SubscribeResponse, UnsubscribeRequest, UnsubscribeResponse,
    ExceptionResponse, CommandResponse.

    StatusCodes: 200, 204, 400, 500, 502, 504.
  version: 26.01.13f000
  contact:
    name: Extracted from firmware — not an official Lutron document

servers:
  - url: leap://10.0.0.1:8081
    description: RA3 Processor (TLS)

# Transport configuration:
# LEAP TLS:     TCP 8081 (10 clients max, 600s idle timeout)
# LEAP plain:   TCP 8080 (localhost only)
# LAP (mobile): TCP 8083 (mTLS, 25 integrators max)
# HAP (HomeKit):TCP 4548 (20 clients max)
# McLEAP:       UDP 239.255.255.255:2647 (multicast, 4000 byte max)

