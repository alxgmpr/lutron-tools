esphome:
  name: pico-trigger
  friendly_name: Pico RF Transmitter

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: gompper-sage-iot
  password: 7qnUoWuiVbExHaU

logger:
  level: DEBUG

api:
  encryption:
    key: "EixuPCx/wLtc5a55a/16gNEubH7qiZWFhn7LR98qQU8="

ota:
  platform: esphome
  password: "test"

web_server:
  port: 80
  auth:
    username: admin
    password: claude

# External component for Lutron CC1101
external_components:
  - source:
      type: local
      path: custom_components

# SPI bus for CC1101
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Lutron CC1101 component
lutron_cc1101:
  id: lutron_radio
  cs_pin: GPIO21
  gdo0_pin: GPIO2

# RF transmit buttons for Pico 05851117
# Button codes: ON=0x02, OFF=0x04, RAISE=0x05, LOWER=0x06, FAVORITE=0x03
button:
  - platform: template
    name: "RF On"
    id: rf_on
    icon: "mdi:lightbulb-on"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x02);
          ESP_LOGI("lutron", "Sent ON command");

  - platform: template
    name: "RF Off"
    id: rf_off
    icon: "mdi:lightbulb-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x04);
          ESP_LOGI("lutron", "Sent OFF command");

  - platform: template
    name: "RF Raise"
    id: rf_raise
    icon: "mdi:arrow-up-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x05);
          ESP_LOGI("lutron", "Sent RAISE command");

  - platform: template
    name: "RF Lower"
    id: rf_lower
    icon: "mdi:arrow-down-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x06);
          ESP_LOGI("lutron", "Sent LOWER command");

  - platform: template
    name: "RF Favorite"
    id: rf_favorite
    icon: "mdi:star"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x03);
          ESP_LOGI("lutron", "Sent FAVORITE/STOP command");
