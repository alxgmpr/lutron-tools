# External component for Lutron CC1101
external_components:
  - source:
      type: local
      path: custom_components

# SPI bus for CC1101
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Lutron CC1101 component
lutron_cc1101:
  id: lutron_radio
  cs_pin: GPIO21
  gdo0_pin: GPIO2

# RF transmit buttons
button:
  # Pico-style buttons for device 05851117
  - platform: template
    name: "RF On (Pico)"
    id: rf_on
    icon: "mdi:lightbulb-on"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x02);

  - platform: template
    name: "RF Off (Pico)"
    id: rf_off
    icon: "mdi:lightbulb-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x04);

  - platform: template
    name: "RF Raise (Pico)"
    id: rf_raise
    icon: "mdi:arrow-up-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x05);

  - platform: template
    name: "RF Lower (Pico)"
    id: rf_lower
    icon: "mdi:arrow-down-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x06);

  - platform: template
    name: "RF Favorite (Pico)"
    id: rf_favorite
    icon: "mdi:star"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x03);

  # Bridge-style level commands for device AF902C00
  - platform: template
    name: "Level 0% (AF902C00)"
    icon: "mdi:lightbulb-off-outline"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0x002C90AF, 0);

  - platform: template
    name: "Level 25% (AF902C00)"
    icon: "mdi:brightness-4"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0x002C90AF, 25);

  - platform: template
    name: "Level 50% (AF902C00)"
    icon: "mdi:brightness-5"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0x002C90AF, 50);

  - platform: template
    name: "Level 75% (AF902C00)"
    icon: "mdi:brightness-6"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0x002C90AF, 75);

  - platform: template
    name: "Level 100% (AF902C00)"
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0x002C90AF, 100);

  # ============================================================
  # RMJ-16R-DV-B Relay Module (MAC: 00BC2107)
  # ============================================================
  # To control this relay, you must first pair a device ID with it.
  # Pico-style commands use the SOURCE device ID (the paired Pico),
  # NOT the relay's MAC address.
  #
  # WORKFLOW:
  # 1. Hold relay button for 10 sec until LED blinks (pairing mode)
  # 2. Press one of the PAIR buttons below
  # 3. Wait for relay to exit pairing mode
  # 4. Use the matching ON/OFF buttons for that device ID
  # ============================================================

  # --- PAIRING BUTTONS ---
  # Put relay in pairing mode FIRST, then press one of these

  - platform: template
    name: "PAIR: Real Pico 05851117"
    icon: "mdi:link-variant-plus"
    on_press:
      - lambda: |-
          // Register the real Pico ID with the relay
          id(lutron_radio)->send_pairing(0x17118505, 0x04);

  - platform: template
    name: "PAIR: Fake CC1101 (DEADBEEF)"
    icon: "mdi:link-variant-plus"
    on_press:
      - lambda: |-
          // Register our fake device ID with the relay
          id(lutron_radio)->send_pairing(0xDEADBEEF, 0x02);

  # --- CONTROL BUTTONS (use the paired device ID!) ---

  # Control relay using the REAL Pico ID (if paired with it)
  - platform: template
    name: "Relay ON (via Pico 05851117)"
    icon: "mdi:electric-switch"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x02);

  - platform: template
    name: "Relay OFF (via Pico 05851117)"
    icon: "mdi:electric-switch-closed"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x17118505, 0x04);

  # Control relay using our FAKE device ID (if paired with it)
  - platform: template
    name: "Relay ON (via CC1101 DEADBEEF)"
    icon: "mdi:power-plug"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0xDEADBEEF, 0x02);

  - platform: template
    name: "Relay OFF (via CC1101 DEADBEEF)"
    icon: "mdi:power-plug-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0xDEADBEEF, 0x04);
