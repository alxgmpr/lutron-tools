# LEAP MITM Proxy — pf redirect rules
#
# Redirects outgoing connections from this Mac to the Lutron processor
# (10.0.0.1:8081) to the local MITM proxy (127.0.0.1:8081).
#
# Enable:  sudo pfctl -ef tools/pf-mitm.conf
# Disable: sudo pfctl -d
# Status:  sudo pfctl -sr
#
# NOTE: This only affects connections FROM this Mac. The proxy itself
# connects to the real processor directly (not affected by this rule
# because pf rdr doesn't apply to locally-originated traffic to the
# redirect target).

# Redirect outgoing LEAP traffic to local proxy
# The "pass" keyword means matching packets are not checked against filter rules
rdr pass on lo0 inet proto tcp from any to 10.0.0.1 port 8081 -> 127.0.0.1 port 8081

# Also need to redirect on the physical interface for non-loopback
rdr pass on en0 inet proto tcp from any to 10.0.0.1 port 8081 -> 127.0.0.1 port 8081

# Pass all traffic (don't block anything else)
pass all
