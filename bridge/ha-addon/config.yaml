name: CCX-WiZ Bridge
description: Lutron Thread → WiZ smart bulb bridge via nRF 802.15.4 sniffer
version: 0.3.0
slug: ccx-bridge
arch:
  - aarch64
  - amd64
init: false
host_network: true
devices:
  - /dev/ttyACM0
map:
  - config:rw
environment:
  CCX_DATA_DIR: /config/ccx-bridge
options:
  thread_channel: 25
  thread_master_key: ""
  sniffer_device: /dev/ttyACM0
  wiz_port: 38899
  nucleo_host: "10.0.0.3"
  device_serials: []
  pairings: []
schema:
  thread_channel: "int(11,26)"
  thread_master_key: password
  sniffer_device: str
  wiz_port: port
  nucleo_host: "str?"
  device_serials:
    - zone_id: int
      serial: int
  pairings:
    - zone_id: int
      name: "str?"
      wiz_ips:
        - str
