{
  "LoggingConfigFilePath": "/etc/lutron.d/platform_logging.json",
  "Scripts": {
    "RestartNetworkInterface": "/usr/sbin/applyWiredWirelessNetworkConfiguration.sh",
    "SystemReboot": "/usr/sbin/system_reboot.sh",
    "FirmwareDownloadScript": "/usr/sbin/fwu_check_and_download.sh",
    "FirmwareInstallScript": "/usr/sbin/triggerUpgrade.sh",
    "ProcessorFirmwareUpgradeStatusStringsScript":"/usr/sbin/firmwareUpgradeStatusStrings.sh",
    "CreateSupportFileScript":"/usr/sbin/createSupportFile.sh",
    "CheckinDefaultFirmwareUpgradeStatusScript":"/usr/sbin/check_in_default_status.sh",
    "ProcessorDeviceTypeScript":"/usr/sbin/get_system_type.sh",
    "UpdateIpv6StaticSettingsScript":"/usr/sbin/updateIpv6StaticSettings.sh",
    "ProxyClientInitScript":"/etc/init.d/S14-lutron-socks-client",
    "TcpdumpCaptureScript":"/usr/sbin/capture_tcpdump.sh",
    "LogFileRotateScript": "/usr/sbin/rotatelog.sh",
    "LogDroppedPacketsRulesScript": "/etc/network-firewall/iptables/runtime/log_dropped_packets.rules",
    "UnsecuredIPLTunnelRulesScript": "/etc/network-firewall/iptables/runtime/unsecured_ipl_tunnel.rules",
    "FluentBitInitScript": "/etc/init.d/S76-fluent-bit",
    "ChronyDaemonScript": "/usr/sbin/lutronChronyDaemon.sh",
    "SerialNumberScript":"/usr/bin/getEepromSerialNumber.sh",
    "DeviceClassScript":"/usr/bin/getEepromDeviceClass.sh",
    "HardwareTypeScript":"/usr/bin/getEepromProcessorType.sh"
  },
  "MaxOOBTimeMinutes": 10,
  "UptimeLocation": "/proc/uptime",
  "OobTimeLimitSeconds": 1800,
  "Sftp": {
    "ProcessorFirmwareDownload": {
      "User": "u_fwu",
      "Port": 22,
      "Interface": "eth0",
      "ChrootPath": "/var/firmware/u_fwu",
      "DownloadDir": "download",
      "FileName": "lutron_firmware",
      "AuthorizedKey": "",
      "UserHomePath": "/home/u_fwu"
    },
    "SupportFileGeneration": {
      "User": "support",
      "Port": 22,
      "Interface": "eth0",
      "ChrootPath": "/var/sftp/support/tmp",
      "DownloadDir": "",
      "FileName": "supportfile",
      "AuthorizedKey": "/home/support/.ssh/authorized_keys",
      "UserHomePath": "/var/sftp/support"
    },
    "DatabaseTransferManagement": {
      "User": "u_db-transfer-mngmt",
      "Port": 22,
      "Interface": "eth0",
      "ChrootPath": "/var/sftp/u_db-transfer-mngmt",
      "DownloadDir": "db",
      "FileName": "lutron-extraction-db.sqlite",
      "AuthorizedKey": "",
      "UserHomePath": "/home/u_db-transfer-mngmt"
    },
    "DeviceFirmwarePackageDownload": {
      "User": "u_dfp",
      "Port": 22,
      "Interface": "eth0",
      "ChrootPath": "/var/firmware/u_dfp",
      "DownloadDir": "download",
      "FileName": "lutron_device_firmware",
      "AuthorizedKey": "",
      "UserHomePath": "/home/u_dfp"
    }
  },
  "FirmwareDestinationPath": "/var/firmware/",
  "ProcessorFirmwareFile": "/var/firmware/lutron_firmware",
  "ProcessorFirmwareUpgradeStatusFile":"/var/firmware/firmware_upgrade_status",
  "BootSessionDir": "/var/misc/platform_manager/boot_session",
  "TempSessionDir": "/tmp/platform_manager/tmp",
  "ScratchSpace" : "/var/misc_unsynced/scratchspace",
  "ConfigDbBackupPath" : "/var/misc_unsynced/scratchspace/config_db_backup",
  "ConfigDbDownloadPath" : "/var/misc_unsynced/scratchspace/config_db_download",
  "OpkgConfigBaseDir" : "/etc",
  "OpkgLibBaseDir" : "/var/lib",
  "SystemLogsBaseDir" : "/var/log",
  "LutronCacheDirectory": "/var/lutron-cache",
  "SslCertPath": "/etc/ssl/certs/ca-certificates.crt",
  "LocalProxyApplication": "/usr/sbin/localproxy",
  "DeviceFirmwareDestinationPath": "/var/firmware/",
  "DeviceFirmwareFile": "/var/firmware/lutron_device_firmware",
  "DeviceFirmwarePackageRepositoryUrlFile": "/tmp/platform_manager/tmp/device_firmware_repo_url",
  "Metrics":{
    "CPU": {
      "TimingParameters": {
        "CycleTimeSeconds":60,
        "CyclesPerLog": 60
      },
      "CpuChangeInUsageThreshold":10,
      "NumberOfProcessesToRecord":5,
      "KeyProcesses": [
        "lutron-core",
        "multi-server-phoenix.gobin",
        "domain-object-manager.gobin",
        "hotel-integration-backend",
        "hotel-integration-frontend"
      ]
    }
  },
  "NoInternetLedFeedbackEnabled": true
}
