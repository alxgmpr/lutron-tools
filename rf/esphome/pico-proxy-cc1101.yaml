esphome:
  name: pico-trigger
  friendly_name: Pico RF Transmitter

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: gompper-sage-iot
  password: 7qnUoWuiVbExHaU

logger:
  level: DEBUG

api:
  encryption:
    key: "EixuPCx/wLtc5a55a/16gNEubH7qiZWFhn7LR98qQU8="

ota:
  platform: esphome
  password: "test"

# web_server removed to save memory - use local Python server with aioesphomeapi instead
# See: esphome/esp32_controller.py

# External component for Lutron CC1101
external_components:
  - source:
      type: local
      path: custom_components

# SPI bus for CC1101
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Lutron CC1101 component
lutron_cc1101:
  id: lutron_radio
  cs_pin: GPIO21
  gdo0_pin: GPIO2

# Global for beacon toggle state
globals:
  - id: beacon_active
    type: bool
    initial_value: 'false'
  - id: beacon_seq
    type: uint8_t
    initial_value: '0'

# Interval to send beacons when enabled
interval:
  - interval: 65ms
    then:
      - lambda: |-
          if (id(beacon_active)) {
            // Send beacon using proper function (includes CRC calculation)
            // Using AF902C01 as our load ID
            id(beacon_seq) = id(lutron_radio)->send_beacon_single(0xAF902C01, id(beacon_seq));
          }

# Beacon toggle switch
switch:
  - platform: template
    name: "ESP32 Beacon Mode"
    id: beacon_mode_switch
    icon: "mdi:broadcast"
    optimistic: true
    turn_on_action:
      - globals.set:
          id: beacon_active
          value: 'true'
      - logger.log: "Beacon mode ON"
    turn_off_action:
      - globals.set:
          id: beacon_active
          value: 'false'
      - logger.log: "Beacon mode OFF"

# RF transmit buttons
button:
  # Pico-style buttons for device 05851117
  - platform: template
    name: "RF On (Pico)"
    id: rf_on
    icon: "mdi:lightbulb-on"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x02);

  - platform: template
    name: "RF Off (Pico)"
    id: rf_off
    icon: "mdi:lightbulb-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x04);

  - platform: template
    name: "RF Raise (Pico)"
    id: rf_raise
    icon: "mdi:arrow-up-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x05);

  - platform: template
    name: "RF Lower (Pico)"
    id: rf_lower
    icon: "mdi:arrow-down-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x06);

  - platform: template
    name: "RF Favorite (Pico)"
    id: rf_favorite
    icon: "mdi:star"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x03);

  # 4-button Pico 08692d70 (PJ2-4B-GWH-L01)
  # Button codes: ON=0x08, OFF=0x0B, RAISE=0x09, LOWER=0x0A
  - platform: template
    name: "Pico2 On (08692d70)"
    id: pico2_on
    icon: "mdi:lightbulb-on"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x08692d70, 0x08);

  - platform: template
    name: "Pico2 Off (08692d70)"
    id: pico2_off
    icon: "mdi:lightbulb-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x08692d70, 0x0B);

  - platform: template
    name: "Pico2 Raise (08692d70)"
    id: pico2_raise
    icon: "mdi:arrow-up-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x08692d70, 0x09);

  - platform: template
    name: "Pico2 Lower (08692d70)"
    id: pico2_lower
    icon: "mdi:arrow-down-bold"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x08692d70, 0x0A);

  # Bridge-style level commands for device AF902C00
  - platform: template
    name: "Level 0% (AF902C00)"
    icon: "mdi:lightbulb-off-outline"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0xAF902C00, 0);

  - platform: template
    name: "Level 25% (AF902C00)"
    icon: "mdi:brightness-4"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0xAF902C00, 25);

  - platform: template
    name: "Level 50% (AF902C00)"
    icon: "mdi:brightness-5"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0xAF902C00, 50);

  - platform: template
    name: "Level 75% (AF902C00)"
    icon: "mdi:brightness-6"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0xAF902C00, 75);

  - platform: template
    name: "Level 100% (AF902C00)"
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_level(0xAF902C00, 100);

  # PAIRING - Uses 0xB9 format from real Pico capture
  - platform: template
    name: "PAIR (0xB9)"
    icon: "mdi:link-plus"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_pairing_b9(0x05851117);

  # TEST - Single packet for RTL-SDR capture analysis
  - platform: template
    name: "TEST PKT"
    id: test_pkt
    icon: "mdi:access-point"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_test_packet(0x05851117);

  # DEBUG - Send raw 0xAA pattern to test CC1101
  - platform: template
    name: "DEBUG PATTERN"
    id: debug_pattern
    icon: "mdi:bug"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_debug_pattern();

  # PAIR with NEW unique device ID for ESP32 (old B9 method)
  - platform: template
    name: "PAIR ESP32 (B9)"
    id: pair_esp32
    icon: "mdi:link-variant-plus"
    on_press:
      - lambda: |-
          // Unique device ID for ESP32 (not the real Pico's ID)
          // Using 0xCC110001 = "CC1101" with suffix 01
          id(lutron_radio)->send_pairing_b9(0xCC110001);

  # PICO-STYLE PAIRING (0xBB) - Discovered from real Pico capture!
  # This sends 0xBB packets like a real Pico does when holding FAVORITE
  - platform: template
    name: "PAIR PICO-STYLE (BB)"
    id: pair_pico_style
    icon: "mdi:remote"
    on_press:
      - lambda: |-
          // Use unique ESP32 device ID, send for 6 seconds like real Pico
          id(lutron_radio)->send_pairing_pico(0xCC110001, 6);

  # Scene Pico 084b1ebb buttons (Bright/Entertain/Relax/Off)
  # Scene Picos use button codes 0x08-0x0B, NOT 0x02-0x06 like dimmer Picos
  - platform: template
    name: "Bright (084b1ebb)"
    id: rf_bright_084b1ebb
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x084b1ebb, 0x08);

  - platform: template
    name: "Entertain (084b1ebb)"
    id: rf_entertain_084b1ebb
    icon: "mdi:party-popper"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x084b1ebb, 0x09);

  - platform: template
    name: "Relax (084b1ebb)"
    id: rf_relax_084b1ebb
    icon: "mdi:sofa"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x084b1ebb, 0x0A);

  - platform: template
    name: "Off (084b1ebb)"
    id: rf_off_084b1ebb
    icon: "mdi:lightbulb-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x084b1ebb, 0x0B);

  # =====================================================
  # BRIDGE EMULATION - Pairing Beacons
  # These should make dimmers/picos flash as if bridge
  # is in pairing mode!
  # =====================================================

  # Main beacon button - sends 0x92 beacons for 10 seconds
  # Using REAL bridge zone ID: af902c00
  - platform: template
    name: "BEACON (Pairing Mode)"
    id: beacon_pairing
    icon: "mdi:broadcast"
    on_press:
      - lambda: |-
          // Send 0x92 pairing beacons using real bridge zone ID
          id(lutron_radio)->send_beacon(0xAF902C00, 0x92, 10);

  # Quick 5-second beacon for testing
  - platform: template
    name: "BEACON 5s"
    id: beacon_short
    icon: "mdi:broadcast"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_beacon(0xAF902C00, 0x92, 5);

  # Different beacon types for experimentation
  - platform: template
    name: "BEACON 0x91"
    id: beacon_91
    icon: "mdi:radio-tower"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_beacon(0xAF902C00, 0x91, 5);

  - platform: template
    name: "BEACON 0x93"
    id: beacon_93
    icon: "mdi:radio-tower"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_beacon(0xAF902C00, 0x93, 5);

  # =====================================================
  # ESP32 AS BRIDGE - Direct pairing to dimmers
  # Use load ID: 0xAF902C01 (close to real bridge AF902C00)
  # =====================================================

  # Step 1: Send beacons using OUR load ID to put dimmer in pairing mode
  - platform: template
    name: "ESP32 Beacon (AF902C01)"
    id: esp32_beacon
    icon: "mdi:access-point"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_beacon(0xAF902C01, 0x92, 10);

  # Step 2: Send 0xB0 assignment to claim dimmer 06fdeff4
  - platform: template
    name: "ESP32 Pair 06fdeff4"
    id: esp32_pair_06fdeff4
    icon: "mdi:link-plus"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_pairing_b0(0xAF902C01, 0x06FDEFF4);

  # Level commands using ESP32 as bridge
  - platform: template
    name: "ESP32 Level 100% (06fdeff4)"
    id: esp32_level_100
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C01, 0x06FDEFF4, 100);

  - platform: template
    name: "ESP32 Level 0% (06fdeff4)"
    id: esp32_level_0
    icon: "mdi:brightness-1"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C01, 0x06FDEFF4, 0);

  # =====================================================
  # BRIDGE-STYLE LEVEL COMMANDS
  # Uses bridge zone ID + target dimmer ID in payload
  # Target: dimmer 06fdeff4
  # =====================================================

  - platform: template
    name: "Bridge Level 100% (06fdeff4)"
    id: bridge_level_100
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          // Bridge zone ID: 0xAF902C00, Target: 0x06FDEFF4
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x06FDEFF4, 100);

  - platform: template
    name: "Bridge Level 50% (06fdeff4)"
    id: bridge_level_50
    icon: "mdi:brightness-5"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x06FDEFF4, 50);

  - platform: template
    name: "Bridge Level 0% (06fdeff4)"
    id: bridge_level_0
    icon: "mdi:brightness-1"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x06FDEFF4, 0);

  # Bridge level commands for dimmer 07004e8c
  - platform: template
    name: "Bridge2 Level 100% (07004e8c)"
    id: bridge2_level_100
    icon: "mdi:brightness-7"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x07004E8C, 100);

  - platform: template
    name: "Bridge2 Level 50% (07004e8c)"
    id: bridge2_level_50
    icon: "mdi:brightness-5"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x07004E8C, 50);

  - platform: template
    name: "Bridge2 Level 0% (07004e8c)"
    id: bridge2_level_0
    icon: "mdi:brightness-1"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_bridge_level(0xAF902C00, 0x07004E8C, 0);

  # =====================================================
  # FAKE STATE REPORTS
  # Emulate dimmer reporting its level to the bridge
  # Uses captured dimmer RF ID: 8f902c08 (the "902c" dimmer)
  # =====================================================

  - platform: template
    name: "Fake State 0% (8f902c08)"
    id: fake_state_0
    icon: "mdi:flash-off"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_state_report(0x8F902C08, 0);

  - platform: template
    name: "Fake State 50% (8f902c08)"
    id: fake_state_50
    icon: "mdi:flash"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_state_report(0x8F902C08, 50);

  - platform: template
    name: "Fake State 100% (8f902c08)"
    id: fake_state_100
    icon: "mdi:flash-alert"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_state_report(0x8F902C08, 100);
