esphome:
  name: pico-trigger
  friendly_name: Pico RF Transmitter

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: gompper-sage-iot
  password: 7qnUoWuiVbExHaU

logger:
  level: DEBUG

api:
  encryption:
    key: "EixuPCx/wLtc5a55a/16gNEubH7qiZWFhn7LR98qQU8="
  services:
    # Dynamic button press - any device ID, any button code
    # Using string for device_id to support full 32-bit unsigned range
    - service: send_button
      variables:
        device_id: string
        button_code: int
      then:
        - lambda: |-
            uint32_t dev_id = strtoul(device_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_button: device=0x%08X button=0x%02X", dev_id, button_code);
            id(lutron_radio)->send_button_press(dev_id, button_code);

    # Dynamic pairing - any device ID
    - service: send_pairing
      variables:
        device_id: string
        duration_seconds: int
      then:
        - lambda: |-
            uint32_t dev_id = strtoul(device_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_pairing: device=0x%08X duration=%ds", dev_id, duration_seconds);
            id(lutron_radio)->send_pairing_pico(dev_id, duration_seconds);

    # Dynamic level command (bridge-style)
    - service: send_level
      variables:
        source_id: string
        target_id: string
        level_percent: int
      then:
        - lambda: |-
            uint32_t src_id = strtoul(source_id.c_str(), nullptr, 0);
            uint32_t tgt_id = strtoul(target_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_level: source=0x%08X target=0x%08X level=%d%%", src_id, tgt_id, level_percent);
            id(lutron_radio)->send_bridge_level(src_id, tgt_id, level_percent);

    # Raw beacon for pairing mode
    - service: send_beacon
      variables:
        device_id: string
        beacon_type: int
        duration_seconds: int
      then:
        - lambda: |-
            uint32_t dev_id = strtoul(device_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_beacon: device=0x%08X type=0x%02X duration=%ds", dev_id, beacon_type, duration_seconds);
            id(lutron_radio)->send_beacon(dev_id, beacon_type, duration_seconds);

    # Fake state report - emulate a device reporting its level
    - service: send_state_report
      variables:
        device_id: string
        level_percent: int
      then:
        - lambda: |-
            uint32_t dev_id = strtoul(device_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_state_report: device=0x%08X level=%d%%", dev_id, level_percent);
            id(lutron_radio)->send_state_report(dev_id, level_percent);

    # Experimental pairing - configurable protocol parameters
    # protocol_variant: 0=new (0x25), 1=old (0x21/0x17)
    # pico_type: 0=scene (4-btn), 1=5-button
    - service: pair_experiment
      variables:
        device_id: string
        ba_count: int
        bb_count: int
        protocol_variant: int
        pico_type: int
      then:
        - lambda: |-
            uint32_t dev_id = strtoul(device_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "pair_experiment: device=0x%08X BA=%d BB=%d proto=%d type=%d",
                     dev_id, ba_count, bb_count, protocol_variant, pico_type);
            id(lutron_radio)->send_pairing_experimental(dev_id, ba_count, bb_count,
                                                         protocol_variant, pico_type);

    # Reset/Unpair - Remove a Pico from a device
    # source_id: The Pico ID that's paired (our ESP32 fake Pico)
    # paired_id: The Pico ID to unregister
    - service: send_reset
      variables:
        source_id: string
        paired_id: string
      then:
        - lambda: |-
            uint32_t src_id = strtoul(source_id.c_str(), nullptr, 0);
            uint32_t pair_id = strtoul(paired_id.c_str(), nullptr, 0);
            ESP_LOGI("service", "send_reset: source=0x%08X paired=0x%08X", src_id, pair_id);
            id(lutron_radio)->send_reset(src_id, pair_id);

ota:
  platform: esphome
  password: "test"

# web_server removed to save memory - use local Python server with aioesphomeapi instead
# See: esphome/esp32_controller.py

# External component for Lutron CC1101
external_components:
  - source:
      type: local
      path: custom_components

# SPI bus for CC1101
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Lutron CC1101 component
lutron_cc1101:
  id: lutron_radio
  cs_pin: GPIO21
  gdo0_pin: GPIO4

# Globals
globals:
  - id: beacon_active
    type: bool
    initial_value: 'false'
  - id: beacon_seq
    type: uint8_t
    initial_value: '0'

# Interval to send beacons when enabled
interval:
  - interval: 65ms
    then:
      - lambda: |-
          if (id(beacon_active)) {
            // Send beacon using proper function (includes CRC calculation)
            // Using AF902C01 as our load ID
            id(beacon_seq) = id(lutron_radio)->send_beacon_single(0xAF902C01, id(beacon_seq));
          }

# Beacon toggle switch only (RX uses buttons to avoid boot loops)
switch:
  - platform: template
    name: "ESP32 Beacon Mode"
    id: beacon_mode_switch
    icon: "mdi:broadcast"
    optimistic: true
    turn_on_action:
      - globals.set:
          id: beacon_active
          value: 'true'
      - logger.log: "Beacon mode ON"
    turn_off_action:
      - globals.set:
          id: beacon_active
          value: 'false'
      - logger.log: "Beacon mode OFF"

# RF buttons
button:
  # RX control - MUST be buttons, switches cause boot loops
  - platform: template
    name: "RX ON"
    id: rx_on
    icon: "mdi:antenna"
    on_press:
      - lambda: id(lutron_radio)->start_rx();

  - platform: template
    name: "RX OFF"
    id: rx_off
    icon: "mdi:antenna-off"
    on_press:
      - lambda: id(lutron_radio)->stop_rx();

  # Pico-style buttons for device 05851117
  - platform: template
    name: "RF On (Pico)"
    id: rf_on
    icon: "mdi:lightbulb-on"
    on_press:
      - lambda: |-
          id(lutron_radio)->send_button_press(0x05851117, 0x02);

  - platform: template
