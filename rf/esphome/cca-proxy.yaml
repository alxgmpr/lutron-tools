substitutions:
  device_name: cca-proxy
  friendly_name: CCA Proxy

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - udp_stream.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          cca_udp_stream.set_address(id(udp_backend_host), id(udp_backend_port));
          cca_udp_stream.begin();

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: WARN

api:
  encryption:
    key: !secret api_key
  services:
    - service: send_button
      variables:
        device_id: string
        button_code: int
      then:
        - lambda: |-
            id(cca_radio)->send_button_press(strtoul(device_id.c_str(), nullptr, 0), button_code);

    - service: send_pairing
      variables:
        device_id: string
        duration_seconds: int
      then:
        - lambda: |-
            id(cca_radio)->send_pairing_pico(strtoul(device_id.c_str(), nullptr, 0), duration_seconds);

    - service: send_level
      variables:
        source_id: string
        target_id: string
        level_percent: int
      then:
        - lambda: |-
            id(cca_radio)->send_bridge_level(
              strtoul(source_id.c_str(), nullptr, 0),
              strtoul(target_id.c_str(), nullptr, 0),
              level_percent);

    - service: send_beacon
      variables:
        device_id: string
        beacon_type: int
        duration_seconds: int
      then:
        - lambda: |-
            id(cca_radio)->send_beacon(strtoul(device_id.c_str(), nullptr, 0), beacon_type, duration_seconds);

    - service: send_state_report
      variables:
        device_id: string
        level_percent: int
      then:
        - lambda: |-
            id(cca_radio)->send_state_report(strtoul(device_id.c_str(), nullptr, 0), level_percent);

    - service: save_favorite
      variables:
        device_id: string
        button_code: int
        hold_seconds: int
      then:
        - lambda: |-
            id(cca_radio)->send_save_favorite(strtoul(device_id.c_str(), nullptr, 0), button_code, hold_seconds);

    - service: pair_5button
      variables:
        device_id: string
        duration_seconds: int
      then:
        - lambda: |-
            id(cca_radio)->send_pairing_5button(strtoul(device_id.c_str(), nullptr, 0), duration_seconds);

    - service: pair_advanced
      variables:
        device_id: string
        duration_seconds: int
        pkt_type_a: int
        pkt_type_b: int
        byte10: int
        byte30: int
        byte31: int
        byte37: int
        byte38: int
      then:
        - lambda: |-
            id(cca_radio)->send_pairing_advanced(
              strtoul(device_id.c_str(), nullptr, 0), duration_seconds,
              pkt_type_a, pkt_type_b, byte10, byte30, byte31, byte37, byte38);

    - service: send_reset
      variables:
        source_id: string
        paired_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_reset(
              strtoul(source_id.c_str(), nullptr, 0),
              strtoul(paired_id.c_str(), nullptr, 0));

    - service: send_bridge_unpair
      variables:
        bridge_zone_id: string
        target_device_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_bridge_unpair(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_device_id.c_str(), nullptr, 0));

    - service: send_bridge_unpair_dual
      variables:
        zone_id_1: string
        zone_id_2: string
        target_device_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_bridge_unpair_dual(
              strtoul(zone_id_1.c_str(), nullptr, 0),
              strtoul(zone_id_2.c_str(), nullptr, 0),
              strtoul(target_device_id.c_str(), nullptr, 0));

    - service: test_decode
      variables:
        hex_bytes: string
      then:
        - lambda: id(cca_radio)->test_decode_packet(hex_bytes);

    - service: send_led_config
      variables:
        bridge_zone_id: string
        target_device_id: string
        mode: int
      then:
        - lambda: |-
            id(cca_radio)->send_led_config(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_device_id.c_str(), nullptr, 0), mode);

    - service: send_fade_config
      variables:
        bridge_zone_id: string
        target_device_id: string
        fade_on_qs: int
        fade_off_qs: int
      then:
        - lambda: |-
            id(cca_radio)->send_fade_config(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_device_id.c_str(), nullptr, 0),
              fade_on_qs, fade_off_qs);

    - service: send_device_state
      variables:
        bridge_zone_id: string
        target_device_id: string
        high_trim: int
        low_trim: int
        phase_reverse: int
      then:
        - lambda: |-
            id(cca_radio)->send_device_state(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_device_id.c_str(), nullptr, 0),
              high_trim, low_trim, phase_reverse != 0);

    - service: pair_device
      variables:
        subnet: string
        factory_id: string
        zone_suffix: string
      then:
        - lambda: |-
            id(cca_radio)->pair_device(
              strtoul(subnet.c_str(), nullptr, 0),
              strtoul(factory_id.c_str(), nullptr, 0),
              strtoul(zone_suffix.c_str(), nullptr, 0));

    - service: start_pairing
      variables:
        subnet: string
      then:
        - lambda: id(cca_radio)->start_bridge_pairing(strtoul(subnet.c_str(), nullptr, 0));

    - service: stop_pairing
      variables:
        subnet: string
      then:
        - lambda: id(cca_radio)->stop_bridge_pairing(strtoul(subnet.c_str(), nullptr, 0));

    - service: send_pair_assignment
      variables:
        subnet: string
        factory_id: string
        zone_suffix: string
      then:
        - lambda: |-
            id(cca_radio)->send_pair_assignment(
              strtoul(subnet.c_str(), nullptr, 0),
              strtoul(factory_id.c_str(), nullptr, 0),
              strtoul(zone_suffix.c_str(), nullptr, 0));

    - service: send_bridge_beacon
      variables:
        beacon_type: int
        subnet: string
        seq: int
      then:
        - lambda: id(cca_radio)->send_bridge_beacon(beacon_type, strtoul(subnet.c_str(), nullptr, 0), seq);

    - service: send_config_packet
      variables:
        config_type: int
        bridge_zone_id: string
        target_hw_id: string
        assigned_load_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_config_packet(config_type,
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_hw_id.c_str(), nullptr, 0),
              strtoul(assigned_load_id.c_str(), nullptr, 0));

    - service: send_device_link
      variables:
        link_type: int
        bridge_zone_id: string
        target_hw_id: string
        linked_device_id: string
        slot: int
      then:
        - lambda: |-
            id(cca_radio)->send_device_link(link_type,
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_hw_id.c_str(), nullptr, 0),
              strtoul(linked_device_id.c_str(), nullptr, 0), slot);

    - service: send_targeted_beacon_93
      variables:
        bridge_zone_id: string
        target_hw_id: string
        subnet: string
      then:
        - lambda: |-
            id(cca_radio)->send_targeted_beacon_93(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_hw_id.c_str(), nullptr, 0),
              strtoul(subnet.c_str(), nullptr, 0));

    - service: send_zone_assignment_82
      variables:
        bridge_zone_id: string
        target_hw_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_zone_assignment_82(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_hw_id.c_str(), nullptr, 0));

    - service: send_state_report_83
      variables:
        bridge_zone_id: string
        target_hw_id: string
      then:
        - lambda: |-
            id(cca_radio)->send_state_report_83(
              strtoul(bridge_zone_id.c_str(), nullptr, 0),
              strtoul(target_hw_id.c_str(), nullptr, 0));

    - service: send_handshake_response
      variables:
        dimmer_type: int
        subnet: string
      then:
        - lambda: id(cca_radio)->send_handshake_response(dimmer_type, strtoul(subnet.c_str(), nullptr, 0));

    - service: set_udp_backend
      variables:
        host: string
        port: int
      then:
        - lambda: |-
            cca_udp_stream.set_address(host.c_str(), port);
            cca_udp_stream.begin();

ota:
  platform: esphome
  password: !secret ota_password

external_components:
  - source:
      type: local
      path: custom_components

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

cc1101_cca:
  id: cca_radio
  cs_pin: GPIO21
  gdo0_pin: GPIO4
  on_packet:
    - lambda: cca_udp_stream.send_packet(data, rssi);
  on_tx:
    - lambda: cca_udp_stream.send_tx_packet(data);

globals:
  - id: udp_backend_host
    type: 'const char*'
    initial_value: !secret udp_backend_host
  - id: udp_backend_port
    type: uint16_t
    initial_value: !secret udp_backend_port
