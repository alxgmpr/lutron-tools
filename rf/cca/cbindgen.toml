# cbindgen configuration for CCA library
# Generates C header from Rust FFI exports

language = "C"

# Header configuration
header = """
/**
 * CCA - Lutron Clear Connect Type A Protocol Library
 *
 * This header is auto-generated by cbindgen. Do not edit manually.
 *
 * Usage:
 *   #include "cca.h"
 *
 *   CcaDecoder *decoder = cca_decoder_new();
 *   CcaPacket packet;
 *   if (cca_parse_bytes(decoder, data, len, &packet)) {
 *       printf("Device: %08X, Type: %s\\n",
 *              packet.device_id,
 *              cca_packet_type_name(packet.packet_type));
 *   }
 *   cca_decoder_free(decoder);
 */
"""

include_guard = "CCA_H"
include_version = true
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify. */"

# Style
style = "both"       # Generate both tag and typedef
braces = "SameLine"
line_length = 100
tab_width = 4

# Documentation
documentation = true
documentation_style = "doxy"

# What to export
[export]
include = ["CcaPacket", "CcaDecoder", "CCA_MAX_PACKET_LEN"]
exclude = []

[export.rename]
# Keep names as-is

[fn]
# Function naming
rename_args = "None"

[struct]
# Struct configuration
rename_fields = "None"
derive_eq = true
derive_neq = true

[enum]
# Enum configuration
rename_variants = "None"

[parse]
# Parse configuration - disable macro expansion to avoid needing nightly
parse_deps = false
include = ["cca"]
expand = []
